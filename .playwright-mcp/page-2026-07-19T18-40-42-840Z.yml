    - generic [ref=e1640]:
      - generic [ref=e1643]:
        - heading "Описание" [level=2] [ref=e1645]
        - generic [ref=e1646]: "Элегантный набор восточных сладостей станет превосходным подарком к любому важному дню — будь то день рождения, Новый год или значимое событие в кругу друзей и близких. Отборный ассорти турецкого лукума гармонично сочетается с орехами, создавая настоящий праздник вкуса для ценителей сладкого. Изысканные продукты питания, отобранные с особой тщательностью, подчеркнут статус подарочного бокса: это не просто сладости, а знак внимания, выражающий заботу и безупречный вкус дарящего.Такой набор идеально подходит, если вы хотите удивить мужчину или женщину, порадовать подругу, порадовать учителя, парня, девушку или даже подобрать подходящий подарок для коллеги, а богатый выбор вкусов подойдет для детей и взрослых. Восточные сладости выгодно дополняют чаепитие, а рахат-лукум с кокосом и орехами подарит минуты истинного наслаждения и станет украшением любой распродажи подарков.Каждая деталь в упаковке продумана: оригинальный бокс не только эстетичен, но и подчеркивает премиальный статус ассортимента. Изысканный подарок мужчине или женщине всегда актуален — деликатесные вкусняшки придутся по вкусу даже гурманам, которые ценят полезные продукты и традиции подарков из России. Ассорти сладких нот, традиционный рахат-лукум, собранный в единый набор, создаст атмосферу восточного праздника и порадует сладкоежек.При выборе подарка на день рождения, Новый год или просто чтобы порадовать близких, обратите внимание на этот сладкий набор — превосходный выбор для любого дня. Турецкие сладости, стиль оформления и качественные продукты питания делают его неотъемлемой частью любой праздничной атмосферы. Не упустите возможность воспользоваться скидками и приобрести эксклюзивный подарок для мужчин, женщин, детей и всей семьи."
      - generic [ref=e1655]:
        - heading "Условия хранения" [level=3] [ref=e1656]
        - paragraph [ref=e1657]: Хранить в сухих, чистых, хорошо проветриваемых помещениях при относительной влажности воздуха не более 75%. После вскрытия упаковки хранить в закрытом внутреннем пакете, исключая возможность попадания влаги и прямого солнечного света.
        - heading "Состав" [level=3] [ref=e1658]
        - paragraph [ref=e1659]: "сахар, крахмал кукурузный, арахис, фундук, миндаль, кокосовая стружка, сок концентрированный вишнёвый, сок концентрированный дынный, сок концентрированный яблочный, красители натуральные. Внимание: возможны следы арахиса, орехов, кунжута и продуктов их переработки."
